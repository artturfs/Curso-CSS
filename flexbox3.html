<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Flexbox #03</title>
    <style>
        div {
            border: solid 5px dodgerblue;
            font-size: 40px;
        }

        .flex-container div {
            box-sizing: border-box;
        }

        .flex-container {
            /* ativa o modo flex; filhos tornam-se flex items */
            display: flex;

            /*
             define o eixo principal e a direção dos itens:
             - row: itens dispostos horizontalmente (esquerda→direita)
             - row-reverse / column / column-reverse
            */
            flex-direction: row;
        }

        .flex-container div {
            /*
             flex-basis: tamanho inicial do item antes de aplicar grow/shrink.
             Ele tem precedência sobre a largura/height quando o item é flex.
            */
            flex-basis: 100px;
            width: 200px; /* vai perder */
        }

        .flex-container div:nth-child(4) {
            /*
             'flex' é o atalho para 'flex-grow flex-shrink flex-basis'.
             Aqui: grow=3 (cresce 3x mais que itens com grow 1),
             shrink=6 (encolhe mais quando houver falta de espaço),
             basis=100px (tamanho inicial antes de ajustar).
            */
            flex: 3 6 100px;
        }

        .flex-container {
            width: 300px;
            width: 600px;
        }
    </style>
</head>

<body>
    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
</body>

</html>
